normalization:
  gravity: 1.0
  lin_vel: 1.0
  ang_vel: 1.0
  dof_pos: 1.0
  dof_vel: 0.1
  push_force: 0.1
  push_torque: 0.5
  clip_actions: 3.0
  filter_weight: 0.3

noise:
  gravity:
    range: [0., 0.01]
    operation: "additive"
    distribution: "gaussian"
  lin_vel:
    range: [0., 0.05]
    operation: "additive"
    distribution: "gaussian"
  ang_vel:
    range: [0., 0.1]
    operation: "additive"
    distribution: "gaussian"
  dof_pos:
    range: [0., 0.01]
    operation: "additive"
    distribution: "gaussian"
  dof_vel:
    range: [0., 0.1]
    operation: "additive"
    distribution: "gaussian"
  height:
    range: [0., 0.02]
    operation: "additive"
    distribution: "gaussian"
  initial_torso:
    range: [0., 0.1]
    operation: "additive"
    distribution: "gaussian"

randomization:
  init_dof_pos:
    range: [0., 0.05]
    operation: "additive"
    distribution: "gaussian"
  init_base_pos_xy:
    range: [-1., 1.]
    operation: "additive"
    distribution: "uniform"

  kick_interval_s: 2.5
  kick_lin_vel:
    range: [0., 0.15]
    operation: "additive"
    distribution: "gaussian"
  kick_ang_vel:
    range: [0., 0.02]
    operation: "additive"
    distribution: "gaussian"

  push_interval_s: 5.
  push_duration_s: 2.
  push_force:
    range: [0., 10.]
    operation: "additive"
    distribution: "gaussian"
  push_torque:
    range: [0., 2.]
    operation: "additive"
    distribution: "gaussian"

  dof_stiffness:
    range: [0.95, 1.05]
    operation: "scaling"
    distribution: "uniform"
  dof_damping:
    range: [0.95, 1.05]
    operation: "scaling"
    distribution: "uniform"
  dof_friction:
    range: [0.0, 2.0]
    operation: "additive"
    distribution: "uniform"

  friction:
    range: [0.2, 2.0]
    operation: "additive"
    distribution: "uniform"
  compliance:
    range: [0.5, 1.5]
    operation: "additive"
    distribution: "uniform"
  restitution:
    range: [0.1, 0.9]
    operation: "additive"
    distribution: "uniform"

  base_com:
    range: [-0.1, 0.1]
    operation: "additive"
    distribution: "uniform"
  base_mass:
    range: [0.8, 1.2]
    operation: "scaling"
    distribution: "uniform"
  other_com:
    range: [-0.005, 0.005]
    operation: "additive"
    distribution: "uniform"
  other_mass:
    range: [0.98, 1.02]
    operation: "scaling"
    distribution: "uniform"

rewards:
  scales:
    tracking_ref_pose: 5 # If all joints and the torso orientation are on point, this is the max reward
    orientation: -5.
    torques: -2.e-4
    torque_tiredness: -1.e-2
    power: -2.e-3
    lin_vel_z: -2.
    ang_vel_xy: -0.2
    dof_vel: -1.e-3
    dof_acc: -1.e-7
    root_acc: -1.e-5
    action_rate: -3.
    dof_pos_limits: -1.
    actions_in_range: -1.
    action_pos_limits: -1.
    feet_slip: -0.1
    fall: -100.
    body_parts_vel_z: -0.1
    leg_torso_deviation_penalty: -10
    jump: -10
    collision: -0.01
    feet_distance: -1
    #body_in_soles: -10

  episode_length_s: 10.
  terminate_vel: 500.
  terminate_time: 0.1
  penalize_contacts_on: ["Head_1", "AAHead_yaw", "Arm", "hand_link", "Hip", "Shank", "Ankle"]
  only_positive_rewards: false # if true negative total rewards are clipped at zero (avoids early termination problems)
  tracking_joint_sigma: 0.5
  tracking_torso_sigma: 0.15
  tracking_joint_max_torso_diff_sigma: 0.25
  penalty_joint_first_keyframe_threshold: 0.1
  penalty_joint_threshold: 0.5
  penalty_torso_threshold: 0.25
  tracking_penalty_torso_weight: 0.5
  soft_dof_pos_limit: 1. # percentage of urdf limits, values above this limit are penalized
  soft_dof_vel_limit: 1.
  soft_torque_limit: 1.
  feet_distance_ref: 0.2
